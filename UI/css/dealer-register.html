<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dealer Sign Up</title>
    <link rel="stylesheet" href="css/dealer-signup.css">
</head>
<body>

<div class="container">
    <h2>Dealer Registration</h2>
    <p class="subtitle">Register as Truck Dealer</p>

    <!-- Email & OTP -->
    <div class="row">
        <input type="email" placeholder="Dealer Email ID" required>
        <button class="otp-btn">Send OTP</button>
    </div>

    <input type="text" placeholder="Enter OTP" required>

    <!-- Dealer Details -->
    <input type="text" placeholder="Dealer / Company Name" required>
    <input type="text" placeholder="Contact Person Name" required>
    <input type="tel" placeholder="Mobile Number" required>

    <!-- Address -->
    <div class="row">
        <input type="text" placeholder="City" required>
        <input type="text" placeholder="Pin Code" required>
    </div>

    <div class="row">
        <input type="text" placeholder="State" required>
        <input type="text" placeholder="Country" required>
    </div>

    <!-- Password -->
    <input type="password" placeholder="Password" required>
    <input type="password" placeholder="Confirm Password" required>

    <button class="submit-btn">Create Dealer Account</button>

    <p class="login-link">
        Already registered? <a href="index.html">Login as Dealer</a>
    </p>
</div>

</body>
</html>
