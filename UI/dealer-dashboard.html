<!DOCTYPE html>
<html>
<head><title>Dealer Dashboard</title></head>
<body>

<h2>Dealer Dashboard</h2>

<form id="truckForm">
  <input id="truckId" placeholder="Truck ID" required><br><br>
  <input id="type" placeholder="Truck Type" required><br><br>
  <input id="capacity" type="number" placeholder="Capacity" required><br><br>
  <input id="route" placeholder="Route" required><br><br>
  <button type="submit">Add Truck</button>
</form>
<hr>

<h3>Available Trucks</h3>

<table border="1" cellpadding="10" id="truckTable">
    <thead>
        <tr>
            <th>Truck ID</th>
            <th>Type</th>
            <th>Capacity</th>
            <th>Route</th>
            <th>Status</th>
            <th>Delete</th>
        </tr>
    </thead>

    <tbody>

    </tbody>
</table>
<script src="dealer-dashboard.js"></script>
</body>
</html>
