<!DOCTYPE html>
<html>
<head><title>Dealer Register</title></head>
<body>

<h2>Dealer Register</h2>

<form id="dealerRegisterForm">
  <input id="companyName" placeholder="Company Name" required><br><br>
  <input id="email" type="email" placeholder="Email" required><br><br>
  <input id="mobile" placeholder="Mobile" required><br><br>
  <input id="password" type="password" placeholder="Password" required><br><br>
  <button type="submit">Register</button>
</form>

<script src="dealer-register.js"></script>
</body>
</html>
