<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dashboard {
      width: 900px;
      max-width: 95%;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      padding: 40px;
    }

    .dashboard h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .login-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 30px;
    }

    .login-card {
      border-radius: 14px;
      padding: 30px;
      background: #f7f9fc;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .login-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 35px rgba(0,0,0,0.15);
    }

    .login-card h2 {
      margin-bottom: 20px;
      color: #1e3c72;
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #555;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: border 0.2s ease;
    }

    .form-group input:focus {
      border-color: #2a5298;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #1e3c72;
      color: #fff;
      font-size: 15px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.3s ease;
    }

    .login-btn:hover {
      background: #2a5298;
    }

    .role-info {
      text-align: center;
      font-size: 13px;
      color: #777;
      margin-top: 12px;
    }

    .create-btn {
    width: 100%;
    padding: 10px;
    margin-top: 12px;
    border-radius: 10px;
    border: 2px solid #1e3c72;
    background: transparent;
    color: #1e3c72;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.3s ease;
    }

.create-btn:hover {
  background: #1e3c72;
  color: #fff;
}


    @media (max-width: 600px) {
      .dashboard {
        padding: 25px;
      }
    }
  </style>
</head>
<body>


  <div class="dashboard">
    <h1>Dashboard Login</h1>

    <div class="login-container">

      <!-- User Login -->
      <div class="login-card">
        <h2>User Login</h2>
        <form>
          <div class="form-group">
            <label for="user-email">Email</label>
            <input type="email" id="user-email" placeholder="Enter user email" required />
          </div>
          <div class="form-group">
            <label for="user-password">Password</label>
            <input type="password" id="user-password" placeholder="Enter password" required />
          </div>
          <button type="submit" class="login-btn">Login as User</button>
        </form>
        <div class="role-info">Access personal dashboard</div>
        <button 
        class="create-btn" 
        onclick="window.location.href='user-register.html'">
        Create User Account
</button>

      </div>

      <!-- Dealer Login -->
<div class="login-card">
  <h2>Dealer Login</h2>

  <form action="dealer-dashboard.html" method="GET">
    <div class="form-group">
      <label for="dealer-id">Dealer ID</label>
      <input type="text" id="dealer-id" placeholder="Enter dealer ID" required />
    </div>

    <div class="form-group">
      <label for="dealer-password">Password</label>
      <input type="password" id="dealer-password" placeholder="Enter password" required />
    </div>

    <button type="submit" class="login-btn">Login as Dealer</button>
  </form>

  <div class="role-info">Manage products & sales</div>

  <button
    type="button"
    class="create-btn"
    onclick="window.location.href='dealer-register.html'">
    Create Dealer Account
  </button>
</div>

      </div>

    </div>
  </div>

</body>
</html>
