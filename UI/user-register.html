<!DOCTYPE html>
<html>
<head><title>User Register</title></head>
<body>

<h2>User Register</h2>

<form id="registerForm">
  <input id="name" placeholder="Name" required><br><br>
  <input id="email" type="email" placeholder="Email" required><br><br>
  <input id="mobile" placeholder="Mobile" required><br><br>
  <input id="password" type="password" placeholder="Password" required><br><br>
  <input id="city" placeholder="City"><br><br>
  <input id="state" placeholder="State"><br><br>
  <input id="country" placeholder="Country"><br><br>
  <button type="submit">Register</button>
</form>

<script src="user-register.js"></script>
</body>
</html>
